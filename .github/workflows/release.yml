name: Release

on:
  pull_request:
    types: [closed]
    branches: [main]
    paths:
      - 'package.json'

env:
  NODE_VERSION: 26.x

permissions:
  contents: read

jobs:
  build:
    name: Build
    if: ${{ github.event.pull_request.merged && github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit
          disable-telemetry: true
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: https://registry.npmjs.org
          cache: npm
      - name: Set env
        run: |
          tag=$(npm pkg get version | xargs)
          echo "tag=${tag}" >> "$GITHUB_ENV"
          echo "prerelease=$([ "${tag##*-*}" ] && echo false || echo true)" >> "$GITHUB_ENV"
          published=$(npm view "$(npm pkg get name | xargs)@${tag}" version 2>/dev/null || true)
          echo "should_release=$([ -z "$published" ] && echo true || echo false)" >> "$GITHUB_ENV"
      - name: Install dependencies
        if: ${{ env.should_release == 'true' }}
        run: |
          npm ci
      - name: Verify dependency signatures
        if: ${{ env.should_release == 'true' }}
        run: |
          npm audit signatures
      - name: Build
        if: ${{ env.should_release == 'true' }}
        run: |
          npm run build --if-present
      - name: Pack
        id: pack
        if: ${{ env.should_release == 'true' }}
        run: |
          {
            echo "packages<<EOF"
            npm pack --json
            echo EOF
          } >> "$GITHUB_OUTPUT"
      - name: Build Attestations
        if: ${{ env.should_release == 'true' }}
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            **/*.tgz
      - name: Upload artifact
        if: ${{ env.should_release == 'true' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ env.tag }}
          path: |
            package.json
            *.tgz
    outputs:
      tag: ${{ env.tag }}
      prerelease: ${{ env.prerelease }}
      should_release: ${{ env.should_release }}

  release:
    name: Release
    needs: build
    if: ${{ needs.build.outputs.should_release == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit
          disable-telemetry: true
      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0 # zizmor: ignore[cache-poisoning] no cache configured (no `cache:` input); reconsider if caching is added
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: https://registry.npmjs.org
      - name: Download artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # 8.0.1
        with:
          name: ${{ needs.build.outputs.tag }}
      - name: Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0 # zizmor: ignore[superfluous-actions] prefer maintained action over inline `gh release` script
        with:
          draft: false
          prerelease: ${{ needs.build.outputs.prerelease }}
          tag_name: ${{ needs.build.outputs.tag }}
          generate_release_notes: true
          files: |
            **/*.tgz
    outputs:
      tag: ${{ needs.build.outputs.tag }}
      prerelease: ${{ needs.build.outputs.prerelease }}
      should_release: ${{ needs.build.outputs.should_release }}

  publish:
    name: Publish
    needs: release
    if: ${{ needs.release.outputs.should_release == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm publish
      attestations: read # gh attestation verify
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit
          disable-telemetry: true
      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: https://registry.npmjs.org
      - name: Download artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # 8.0.1
        with:
          name: ${{ needs.release.outputs.tag }}
      - name: Verify build provenance attestation
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          count=$(find . -name '*.tgz' | wc -l)
          if [ "$count" -eq 0 ]; then echo "::error::no .tgz artifact found"; exit 1; fi
          find . -name '*.tgz' -print -exec gh attestation verify {} --repo ${{ github.repository }} \;
      - name: npm publish (next)
        if: ${{ needs.release.outputs.prerelease == 'true' }}
        run: |
          count=$(find . -name '*.tgz' | wc -l)
          if [ "$count" -eq 0 ]; then echo "::error::no .tgz artifact found"; exit 1; fi
          find . -name '*.tgz' -exec npm publish --tag next --provenance --access public {} \;
      - name: npm publish (latest)
        if: ${{ needs.release.outputs.prerelease == 'false' }}
        run: |
          count=$(find . -name '*.tgz' | wc -l)
          if [ "$count" -eq 0 ]; then echo "::error::no .tgz artifact found"; exit 1; fi
          find . -name '*.tgz' -exec npm publish --tag latest --provenance --access public {} \;
